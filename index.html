<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulación 3 Cuerpos — Sol · Tierra · Luna</title>
  <meta name="description" content="Simulador 3D del problema de 3 cuerpos usando Three.js y RK4." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#000;font-family:'Inter',sans-serif;color:#e0e0e0}

    /* ── Glassmorphism panel base ── */
    .panel{
      position:fixed;z-index:10;
      background:rgba(8,10,22,0.82);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(100,140,255,0.15);
      border-radius:12px;padding:16px 20px;
      font-family:'JetBrains Mono',monospace;font-size:12px;
      box-shadow:0 4px 30px rgba(0,0,0,0.5);
    }
    .panel h2{
      font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
      text-transform:uppercase;letter-spacing:1.5px;color:#7aa2ff;
      margin-bottom:10px;border-bottom:1px solid rgba(100,140,255,0.15);padding-bottom:7px;
    }

    /* ── HUD — data cards (left) ── */
    #hud{top:16px;left:16px;min-width:255px;line-height:1.65}
    .card{
      padding:6px 0;
      border-bottom:1px solid rgba(100,140,255,0.07);
    }
    .card:last-child{border-bottom:none}
    .card-title{
      font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
      display:flex;align-items:center;gap:6px;margin-bottom:2px;
    }
    .card-title .dot{
      width:8px;height:8px;border-radius:50%;display:inline-block;
    }
    .lbl{color:#8899bb}
    .val{color:#d0e0ff;font-weight:600}
    .val.energy{color:#ffcc44}
    .val.error{color:#66eebb}
    .val.speed{color:#88bbff}

    /* ── Controls (right) ── */
    #controls{top:16px;right:16px;min-width:260px}
    .section-label{
      color:#5577aa;font-size:10px;text-transform:uppercase;
      letter-spacing:1px;margin:10px 0 4px;
    }
    .ctrl-row{margin-bottom:10px}
    .ctrl-row label{display:block;color:#8899bb;font-size:10px;margin-bottom:2px;letter-spacing:0.4px}
    .ctrl-row .slider-val{float:right;color:#d0e0ff;font-weight:600;font-size:10px}
    .ctrl-row input[type=range]{
      width:100%;height:6px;-webkit-appearance:none;appearance:none;
      background:rgba(60,80,140,0.3);border-radius:3px;outline:none;
      margin-top:4px;
    }
    .ctrl-row input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
      background:linear-gradient(135deg,#5588ee,#3366cc);cursor:pointer;
      box-shadow:0 0 6px rgba(80,130,255,0.4);
    }
    .btn-row{display:flex;gap:8px;margin-top:12px}
    .btn-row button{
      flex:1;padding:9px 0;border:none;border-radius:8px;
      font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
      letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;
      transition:transform 0.12s,box-shadow 0.12s;
    }
    #btn-reset{
      background:linear-gradient(135deg,#3366cc,#5588ee);color:#fff;
      box-shadow:0 2px 10px rgba(50,100,220,0.25);
    }
    #btn-defaults{
      background:rgba(40,50,80,0.6);color:#8899bb;
      border:1px solid rgba(100,140,255,0.15);
    }
    .btn-row button:hover{transform:translateY(-1px)}
    .btn-row button:active{transform:translateY(0)}

    /* ── Asteroid section ── */
    .asteroid-section{
      margin-top:14px;padding-top:12px;
      border-top:1px solid rgba(255,160,60,0.15);
    }
    .asteroid-section .section-label{color:#cc8833}
    .asteroid-badge{
      display:inline-flex;align-items:center;justify-content:center;
      background:rgba(255,136,68,0.15);color:#ffaa55;
      border:1px solid rgba(255,136,68,0.25);border-radius:20px;
      padding:2px 10px;font-size:11px;font-weight:600;
      font-family:'JetBrains Mono',monospace;
      margin-left:8px;vertical-align:middle;
    }
    .asteroid-section .ctrl-row input[type=range]{
      background:rgba(140,80,30,0.3);
    }
    .asteroid-section .ctrl-row input[type=range]::-webkit-slider-thumb{
      background:linear-gradient(135deg,#ee8833,#cc6622);
      box-shadow:0 0 6px rgba(255,150,50,0.4);
    }
    .asteroid-section .slider-val{color:#ffcc88}
    .dir-row{display:flex;align-items:center;gap:6px}
    .dir-row input[type=range]{flex:1}
    .random-toggle{
      display:flex;align-items:center;gap:4px;
      font-size:9px;color:#cc8833;cursor:pointer;
      white-space:nowrap;margin-top:4px;
    }
    .random-toggle input[type=checkbox]{
      accent-color:#ff9944;width:13px;height:13px;cursor:pointer;
    }
    .btn-asteroid-row{display:flex;gap:8px;margin-top:10px}
    .btn-asteroid-row button{
      flex:1;padding:9px 0;border:none;border-radius:8px;
      font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
      letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;
      transition:transform 0.12s,box-shadow 0.12s;
    }
    #btn-add-asteroid{
      background:linear-gradient(135deg,#cc7722,#ff9944);color:#fff;
      box-shadow:0 2px 10px rgba(200,120,30,0.3);
    }
    #btn-add-asteroid:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(255,150,50,0.4)}
    #btn-add-asteroid:active{transform:translateY(0)}
    #btn-clear-asteroids{
      background:rgba(60,40,30,0.6);color:#cc8855;
      border:1px solid rgba(255,136,68,0.2);
    }
    #btn-clear-asteroids:hover{transform:translateY(-1px);background:rgba(80,50,30,0.7)}
    #btn-clear-asteroids:active{transform:translateY(0)}

    /* ── Playback (bottom center) ── */
    #playback{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;
      display:flex;align-items:center;gap:6px;
      background:rgba(8,10,22,0.85);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(100,140,255,0.15);
      border-radius:40px;padding:8px 18px;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
    }
    #playback button{
      background:none;border:none;color:#d0e0ff;font-size:20px;cursor:pointer;
      width:36px;height:36px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      transition:background 0.15s;
    }
    #playback button:hover{background:rgba(100,140,255,0.12)}
    #playback-label{
      font-family:'JetBrains Mono',monospace;font-size:13px;
      color:#7aa2ff;font-weight:600;min-width:36px;text-align:center;
    }

    /* ── Chart (bottom left) ── */
    #chart-container{
      position:fixed;bottom:16px;left:16px;z-index:10;
      background:rgba(8,10,22,0.82);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(100,140,255,0.15);
      border-radius:12px;padding:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
    }
    #chart-canvas{display:block;border-radius:6px}

    /* ── Collision alert ── */
    #collision-alert{
      position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:20;
      background:rgba(200,50,30,0.85);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      border:1px solid rgba(255,100,80,0.4);
      border-radius:10px;padding:12px 28px;
      font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
      color:#fff;letter-spacing:0.5px;
      box-shadow:0 4px 20px rgba(200,50,30,0.4);
      opacity:0;pointer-events:none;
      transition:opacity 0.3s;
    }
    #collision-alert.visible{opacity:1;pointer-events:auto;animation:pulse 1s infinite}
    @keyframes pulse{
      0%,100%{box-shadow:0 4px 20px rgba(200,50,30,0.4)}
      50%{box-shadow:0 4px 30px rgba(255,80,40,0.7)}
    }

    /* ── Legend (in HUD) ── */
    .legend{margin-top:8px;padding-top:6px;border-top:1px solid rgba(100,140,255,0.08);font-size:11px;line-height:1.8}
    .legend-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
  </style>
</head>
<body>

  <!-- Alerta de colisión -->
  <div id="collision-alert"></div>

  <!-- HUD — tarjetas de datos -->
  <div id="hud" class="panel">
    <h2>☀ Simulación 3 Cuerpos</h2>

    <div class="card">
      <div class="card-title"><span class="dot" style="background:#88bbff"></span>Tiempo</div>
      <span class="lbl">Días:</span> <span id="hud-days" class="val">0</span>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot" style="background:#ffdd44"></span>Sol</div>
      <span class="lbl">Vel:</span> <span id="sol-vel" class="val">0</span>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot" style="background:#4488ff"></span>Tierra</div>
      <span class="lbl">Vel:</span> <span id="tierra-vel" class="val speed">0</span><br>
      <span class="lbl">Dist. al Sol:</span> <span id="tierra-dist" class="val">0</span>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot" style="background:#cccccc"></span>Luna</div>
      <span class="lbl">Vel:</span> <span id="luna-vel" class="val">0</span><br>
      <span class="lbl">Dist. a Tierra:</span> <span id="luna-dist" class="val">0</span>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot" style="background:#ffcc44"></span>Energía</div>
      <span class="lbl">Total:</span> <span id="hud-energy" class="val energy">0</span> <span class="lbl">J</span><br>
      <span class="lbl">Error rel.:</span> <span id="hud-error" class="val error">0</span><br>
      <span class="lbl">E₀:</span> <span id="hud-e0" class="val" style="color:#aa9944">0</span> <span class="lbl">J</span>
    </div>

    <div class="legend">
      <div><span class="legend-dot" style="background:#6688aa"></span>Trayectoria Tierra</div>
      <div><span class="legend-dot" style="background:#ff88aa"></span>Trayectoria Luna</div>
    </div>
  </div>

  <!-- Controles -->
  <div id="controls" class="panel">
    <h2>⚙ Parámetros</h2>

    <div class="section-label">Velocidades</div>
    <div class="ctrl-row">
      <label>Vel. Tierra v₀ <span id="val-earth-v" class="slider-val"></span></label>
      <input type="range" id="slider-earth-v" min="10000" max="50000" step="100" />
    </div>
    <div class="ctrl-row">
      <label>Vel. Luna v₀ rel. <span id="val-moon-v" class="slider-val"></span></label>
      <input type="range" id="slider-moon-v" min="0" max="3000" step="50" />
    </div>

    <div class="section-label">Masas</div>
    <div class="ctrl-row">
      <label>Masa Sol <span id="val-sun-mass" class="slider-val"></span></label>
      <input type="range" id="slider-sun-mass" min="28" max="32" step="0.05" />
    </div>
    <div class="ctrl-row">
      <label>Masa Tierra <span id="val-earth-mass" class="slider-val"></span></label>
      <input type="range" id="slider-earth-mass" min="22" max="28" step="0.05" />
    </div>
    <div class="ctrl-row">
      <label>Masa Luna <span id="val-moon-mass" class="slider-val"></span></label>
      <input type="range" id="slider-moon-mass" min="20" max="26" step="0.05" />
    </div>

    <div class="btn-row">
      <button id="btn-reset">🔄 Reiniciar</button>
      <button id="btn-defaults">↩ Defaults</button>
    </div>

    <div class="asteroid-section">
      <div class="section-label">Asteroides <span id="asteroid-count" class="asteroid-badge">0</span></div>

      <div class="ctrl-row">
        <label>Velocidad <span id="val-ast-speed" class="slider-val"></span></label>
        <input type="range" id="slider-ast-speed" min="5000" max="80000" step="500" value="30000" />
      </div>
      <div class="ctrl-row">
        <label>Dirección θ <span id="val-ast-dir" class="slider-val"></span></label>
        <div class="dir-row">
          <input type="range" id="slider-ast-dir" min="0" max="360" step="1" value="0" />
        </div>
        <label class="random-toggle">
          <input type="checkbox" id="chk-ast-random-dir" checked /> Dirección aleatoria
        </label>
      </div>
      <div class="ctrl-row">
        <label>Masa <span id="val-ast-mass" class="slider-val"></span></label>
        <input type="range" id="slider-ast-mass" min="18" max="32" step="0.05" value="30.30" />
      </div>

      <div class="btn-asteroid-row">
        <button id="btn-add-asteroid">☄ Añadir</button>
        <button id="btn-clear-asteroids">🗑 Limpiar</button>
      </div>
      <button id="btn-slingshot" style="width:100%; margin-top:8px; padding:9px 0; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; cursor:pointer; background:linear-gradient(135deg,#5544aa,#8866ee); color:#fff; box-shadow:0 2px 10px rgba(100,80,200,0.3); transition:transform 0.12s,box-shadow 0.12s;">🚀 Prueba Slingshot</button>
    </div>
  </div>

  <!-- Playback -->
  <div id="playback">
    <button id="btn-slower" title="Más lento">⏪</button>
    <button id="btn-pause" title="Pausa / Play">⏸</button>
    <button id="btn-faster" title="Más rápido">⏩</button>
    <span id="playback-label">1×</span>
  </div>

  <!-- Gráfica -->
  <div id="chart-container">
    <canvas id="chart-canvas" width="400" height="180"></canvas>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
